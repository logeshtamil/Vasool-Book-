// ═══════════════════════════════════════════════════════════════
//  CASH BOOK — Weekly Accounts Manager
//  Screens: LIST → WEEK (entry view) → closed read-only
// ═══════════════════════════════════════════════════════════════
function CashBookScreen({ inline, weekStartDay, reports, weeks: propWeeks, setWeeks: propSetWeeks, onOpenSettings }) {
  const startDay = weekStartDay || 0;

  /* ── lifted state ── */
  const [localWeeks, setLocalWeeks] = useState([]);
  const weeks    = propWeeks    !== undefined ? propWeeks    : localWeeks;
  const setWeeks = propSetWeeks !== undefined ? propSetWeeks : setLocalWeeks;

  /* ── navigation ── */
  const [screen,      setScreen]      = useState("list");   // list | week
  const [activeWkId,  setActiveWkId]  = useState(null);

  /* ── new-week modal ── */
  const [showNew,     setShowNew]     = useState(false);
  const [nwDate,      setNwDate]      = useState("");
  const [nwLblIdx,    setNwLblIdx]    = useState(0);
  const [nwCash,      setNwCash]      = useState("");
  const [nwBank,      setNwBank]      = useState("");

  /* ── entry modal ── */
  const [showEntry,   setShowEntry]   = useState(false);
  const [eId,         setEId]         = useState(null);     // null = new
  const [eCategory,   setECategory]   = useState("collection"); // collection|income|expense
  const [eSign,       setESign]       = useState("+");
  const [eAccount,    setEAccount]    = useState("cash");   // cash|bank
  const [eDesc,       setEDesc]       = useState("");
  const [eAmt,        setEAmt]        = useState("");

  /* ── edit opening balance modal ── */
  const [showOB,      setShowOB]      = useState(false);
  const [obCash,      setObCash]      = useState("");
  const [obBank,      setObBank]      = useState("");

  /* ── closing balance modal ── */
  const [showCL,      setShowCL]      = useState(false);
  const [clCash,      setClCash]      = useState("");
  const [clBank,      setClBank]      = useState("");

  /* ── close week modal ── */
  const [showClose,   setShowClose]   = useState(false);

  /* ─────────────────────────────────────────────────── helpers ── */
  const todayISO  = getTodayISO();

  const getWeekStart = () => {
    const d = new Date(todayISO);
    const diff = (d.getDay() - startDay + 7) % 7;
    d.setDate(d.getDate() - diff);
    return d.toISOString().slice(0,10);
  };

  const weekLabels = genWeekLabels(nwDate || getWeekStart());

  const activeWeek = weeks.find(w => w.id === activeWkId) || null;

  /* ── calculate one week ── */
  const calc = (w) => {
    if (!w) return {};
    const entries = w.entries || [];
    const credits = entries.filter(e => e.sign === "+");
    const debits  = entries.filter(e => e.sign === "-");

    const cashIn   = credits.filter(e=>e.account==="cash").reduce((s,e)=>s+(+e.amount||0),0);
    const bankIn   = credits.filter(e=>e.account==="bank").reduce((s,e)=>s+(+e.amount||0),0);
    const cashOut  = debits.filter(e=>e.account==="cash").reduce((s,e)=>s+(+e.amount||0),0);
    const bankOut  = debits.filter(e=>e.account==="bank").reduce((s,e)=>s+(+e.amount||0),0);

    const opCash   = +w.openingCash || 0;
    const opBank   = +w.openingBank || 0;
    const calcCash = opCash + cashIn - cashOut;
    const calcBank = opBank + bankIn - bankOut;
    const balance  = calcCash + calcBank;

    // closing balance overrides
    const clCashV  = (w.closingCash !== null && w.closingCash !== undefined) ? +w.closingCash : calcCash;
    const clBankV  = (w.closingBank !== null && w.closingBank !== undefined) ? +w.closingBank : calcBank;
    const diffCash = clCashV - calcCash;
    const diffBank = clBankV - calcBank;

    // breakdown
    const collCashIn = credits.filter(e=>e.account==="cash"&&e.category==="collection").reduce((s,e)=>s+(+e.amount||0),0);
    const collBankIn = credits.filter(e=>e.account==="bank"&&e.category==="collection").reduce((s,e)=>s+(+e.amount||0),0);
    const incCashIn  = credits.filter(e=>e.account==="cash"&&e.category!=="collection").reduce((s,e)=>s+(+e.amount||0),0);
    const incBankIn  = credits.filter(e=>e.account==="bank"&&e.category!=="collection").reduce((s,e)=>s+(+e.amount||0),0);
    const expCash    = debits.filter(e=>e.account==="cash").reduce((s,e)=>s+(+e.amount||0),0);
    const expBank    = debits.filter(e=>e.account==="bank").reduce((s,e)=>s+(+e.amount||0),0);

    return {
      opCash,opBank,cashIn,bankIn,cashOut,bankOut,
      calcCash,calcBank,balance,
      clCashV,clBankV,diffCash,diffBank,
      collCashIn,collBankIn,incCashIn,incBankIn,expCash,expBank,
      totCredits:cashIn+bankIn, totDebits:cashOut+bankOut,
    };
  };

  /* ── CRUD helpers ── */
  const createWeek = () => {
    const label = weekLabels[nwLblIdx] || weekLabels[0];
    const wk = {
      id: Date.now(), label,
      startDate: nwDate || getWeekStart(),
      openingCash: nwCash === "" ? 0 : +nwCash,
      openingBank: nwBank === "" ? 0 : +nwBank,
      entries: [], closed: false,
    };
    setWeeks(p=>[...p, wk]);
    setActiveWkId(wk.id);
    setScreen("week");
    setShowNew(false);
    setNwCash(""); setNwBank(""); setNwLblIdx(0);
  };

  const openNewEntry = (defaultCat, defaultSign) => {
    setEId(null); setECategory(defaultCat); setESign(defaultSign);
    setEAccount("cash"); setEDesc(""); setEAmt("");
    setShowEntry(true);
  };

  const openEditEntry = (e) => {
    setEId(e.id); setECategory(e.category||"collection"); setESign(e.sign||"+");
    setEAccount(e.account||"cash"); setEDesc(e.desc||""); setEAmt(e.amount!=null?String(e.amount):"");
    setShowEntry(true);
  };

  const saveEntry = () => {
    const amt = parseFloat(eAmt);
    if (!amt || isNaN(amt)) return;
    const entry = {
      id: eId || Date.now(),
      category: eCategory, sign: eSign, account: eAccount,
      desc: eDesc, amount: amt, date: todayISO,
    };
    setWeeks(p=>p.map(w=>{
      if (w.id !== activeWkId) return w;
      const entries = eId
        ? (w.entries||[]).map(e=>e.id===eId ? entry : e)
        : [...(w.entries||[]), entry];
      return {...w, entries};
    }));
    setShowEntry(false); setEDesc(""); setEAmt(""); setEId(null);
  };

  const delEntry = (eid) => {
    setWeeks(p=>p.map(w=>w.id!==activeWkId?w:{...w,entries:(w.entries||[]).filter(e=>e.id!==eid)}));
  };

  const saveOB = () => {
    setWeeks(p=>p.map(w=>w.id!==activeWkId?w:{
      ...w,
      openingCash: obCash===""?0:+obCash,
      openingBank: obBank===""?0:+obBank,
    }));
    setShowOB(false);
  };

  const saveCL = () => {
    setWeeks(p=>p.map(w=>w.id!==activeWkId?w:{
      ...w,
      closingCash: clCash===""?null:+clCash,
      closingBank: clBank===""?null:+clBank,
    }));
    setShowCL(false);
  };

  const closeWeek = () => {
    setWeeks(p=>p.map(w=>w.id===activeWkId?{...w,closed:true}:w));
    setShowClose(false);
    setScreen("list");
    setActiveWkId(null);
  };

  /* ───────────────────────────────────────── WEEK DETAIL SCREEN ── */
  if (screen === "week" && activeWeek) {
    const wk = activeWeek;
    const c  = calc(wk);
    const isOpen = !wk.closed;
    const autoCount = (wk.entries||[]).filter(e=>e.auto).length;

    /* ── entry row component ── */
    const ERow = ({e}) => (
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"11px 12px",borderBottom:"1px solid #f1f5f9",background:e.auto?"#f8fffe":"#fff"}}>
        {/* icon */}
        <div style={{width:36,height:36,borderRadius:10,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,
          background:e.sign==="+"?(e.account==="bank"?"#dbeafe":"#dcfce7"):(e.account==="bank"?"#e0e7ff":"#fee2e2")}}>
          {e.account==="bank"?"🏦":"💵"}
        </div>
        {/* info */}
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:1}}>
            <span style={{fontSize:13,fontWeight:700,color:"#0f172a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"Georgia,serif"}}>{e.desc||"—"}</span>
            {e.auto&&<span style={{fontSize:8,fontWeight:800,background:"#dbeafe",color:"#1d4ed8",borderRadius:4,padding:"1px 4px",flexShrink:0}}>AUTO</span>}
          </div>
          <div style={{fontSize:10,color:"#94a3b8"}}>
            {e.account==="bank"?"Bank":"Cash"} · {e.category==="collection"?"Collection":e.category==="expense"?"Expense":"Income"} · {fmtDate(e.date)}
          </div>
        </div>
        {/* amount */}
        <div style={{fontSize:14,fontWeight:900,fontFamily:"Georgia,serif",flexShrink:0,color:e.sign==="+"?"#16a34a":"#dc2626"}}>
          {e.sign==="+"?"+":"-"}{fmtN(e.amount||0)}
        </div>
        {/* actions */}
        {isOpen&&(e.auto
          ?<button onClick={()=>delEntry(e.id)} style={{background:"#fff7ed",border:"none",borderRadius:7,padding:"5px 7px",cursor:"pointer",fontSize:11,color:"#d97706",flexShrink:0}}>✕</button>
          :<div style={{display:"flex",gap:3,flexShrink:0}}>
            <button onClick={()=>openEditEntry(e)} style={{background:"#eff6ff",border:"none",borderRadius:7,padding:"5px 7px",cursor:"pointer",fontSize:12,color:"#2563eb"}}>✏️</button>
            <button onClick={()=>delEntry(e.id)} style={{background:"#fff0f0",border:"none",borderRadius:7,padding:"5px 7px",cursor:"pointer",fontSize:12,color:"#dc2626"}}>✕</button>
          </div>
        )}
      </div>
    );

    return (
      <div style={{background:"#f1f5f9",minHeight:"100vh",maxWidth:430,margin:"0 auto",paddingBottom:inline?90:30}}>

        {/* ════════════ ADD / EDIT ENTRY MODAL ════════════ */}
        {showEntry&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:9999,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div style={{background:"#fff",borderRadius:"22px 22px 0 0",padding:"20px 16px 34px",width:"100%",maxWidth:430,maxHeight:"92vh",overflowY:"auto"}}>
              <div style={{width:40,height:4,background:"#e2e8f0",borderRadius:2,margin:"0 auto 14px"}}/>
              <div style={{fontSize:16,fontWeight:900,color:"#1a3a6b",fontFamily:"Georgia,serif",marginBottom:16}}>{eId?"✏️ Edit Entry":"➕ New Entry"}</div>

              {/* Category tabs */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:14}}>
                {[
                  {k:"collection",l:"📋 Collection",col:"#1a3a6b",sign:"+"},
                  {k:"income",    l:"💰 Income",     col:"#15803d",sign:"+"},
                  {k:"expense",   l:"💸 Expense",    col:"#dc2626",sign:"-"},
                ].map(t=>(
                  <button key={t.k} onClick={()=>{setECategory(t.k);setESign(t.sign);}}
                    style={{padding:"9px 5px",borderRadius:11,border:"2px solid "+(eCategory===t.k?t.col:"#e2e8f0"),
                      background:eCategory===t.k?(t.k==="expense"?"#fff0f0":t.k==="income"?"#f0fdf4":"#eff6ff"):"#f8fafc",
                      color:eCategory===t.k?t.col:"#64748b",fontSize:12,fontWeight:800,cursor:"pointer"}}>
                    {t.l}
                  </button>
                ))}
              </div>

              {/* Description */}
              <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",marginBottom:5}}>Description</div>
              <input placeholder={eCategory==="collection"?"Area name / Report desc":eCategory==="expense"?"Fuel, Food, Salary…":"Income source"} value={eDesc}
                onChange={e=>setEDesc(e.target.value)}
                style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:11,padding:"12px 13px",fontSize:14,outline:"none",fontFamily:"Georgia,serif",marginBottom:12,boxSizing:"border-box",color:"#0f172a"}}/>

              {/* Amount */}
              <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",marginBottom:5}}>Amount (₹)</div>
              <input type="number" inputMode="decimal" placeholder="0.00" value={eAmt}
                onChange={e=>setEAmt(e.target.value)}
                style={{width:"100%",border:"2px solid #3b82f6",borderRadius:11,padding:"14px",fontSize:20,outline:"none",fontFamily:"Georgia,serif",fontWeight:900,textAlign:"right",marginBottom:14,boxSizing:"border-box",color:"#0f172a"}}/>

              {/* Credit / Debit */}
              <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",marginBottom:7}}>Type</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                {[{s:"+",l:"➕ Credit (வரவு)",col:"#16a34a",bg:"#f0fdf4"},{s:"-",l:"➖ Debit (செலவு)",col:"#dc2626",bg:"#fff0f0"}].map(({s,l,col,bg})=>(
                  <button key={s} onClick={()=>setESign(s)}
                    style={{padding:"11px",borderRadius:11,border:"2px solid "+(eSign===s?col:"#e2e8f0"),background:eSign===s?bg:"#fff",color:eSign===s?col:"#64748b",fontSize:12,fontWeight:800,cursor:"pointer"}}>
                    {l}
                  </button>
                ))}
              </div>

              {/* Cash / Bank */}
              <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",marginBottom:7}}>Account</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:18}}>
                {[{a:"cash",l:"💵 Cash",col:"#15803d",bg:"#f0fdf4"},{a:"bank",l:"🏦 Bank",col:"#1d4ed8",bg:"#eff6ff"}].map(({a,l,col,bg})=>(
                  <button key={a} onClick={()=>setEAccount(a)}
                    style={{padding:"12px",borderRadius:11,border:"2px solid "+(eAccount===a?col:"#e2e8f0"),background:eAccount===a?bg:"#fff",color:eAccount===a?col:"#64748b",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                    {l}
                  </button>
                ))}
              </div>

              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setShowEntry(false);setEId(null);}}
                  style={{flex:1,padding:"13px",borderRadius:12,background:"#f8fafc",border:"1.5px solid #e2e8f0",color:"#64748b",fontSize:14,cursor:"pointer"}}>Cancel</button>
                <button onClick={saveEntry} disabled={!eAmt}
                  style={{flex:2,padding:"13px",borderRadius:12,border:"none",color:"#fff",fontSize:14,fontWeight:800,cursor:!eAmt?"not-allowed":"pointer",fontFamily:"Georgia,serif",
                    background:!eAmt?"#cbd5e1":eSign==="-"?"linear-gradient(90deg,#b91c1c,#dc2626)":"linear-gradient(90deg,#15803d,#22c55e)"}}>
                  {eId?"💾 Save Changes":eSign==="-"?"➖ Add Expense/Debit":"➕ Add Credit"}
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ════════════ CLOSE WEEK MODAL ════════════ */}
        {showClose&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:9998,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div style={{background:"#fff",borderRadius:"22px 22px 0 0",padding:"28px 20px 36px",width:"100%",maxWidth:430}}>
              <div style={{width:40,height:4,background:"#e2e8f0",borderRadius:2,margin:"0 auto 20px"}}/>
              <div style={{textAlign:"center",marginBottom:20}}>
                <div style={{fontSize:44,marginBottom:8}}>🔒</div>
                <div style={{fontSize:17,fontWeight:900,color:"#0f172a",fontFamily:"Georgia,serif",marginBottom:8}}>Close This Week?</div>
                <div style={{fontSize:13,color:"#64748b",lineHeight:1.8,fontFamily:"Georgia,serif"}}>
                  💵 Cash: <strong style={{color:c.calcCash>=0?"#16a34a":"#dc2626"}}>{fmtN(c.calcCash)}</strong><br/>
                  🏦 Bank: <strong style={{color:c.calcBank>=0?"#16a34a":"#dc2626"}}>{fmtN(c.calcBank)}</strong><br/>
                  ⚖️ Net: <strong style={{color:c.balance>=0?"#16a34a":"#dc2626"}}>{fmtN(c.balance)}</strong>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <button onClick={closeWeek} style={{padding:"14px",borderRadius:13,background:"linear-gradient(90deg,#1a3a6b,#2563eb)",border:"none",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"Georgia,serif"}}>✅ Finalise & Close Week</button>
                <button onClick={()=>setShowClose(false)} style={{padding:"14px",borderRadius:13,background:"#fff",border:"1.5px solid #e2e8f0",color:"#64748b",fontSize:14,cursor:"pointer"}}>Keep Open</button>
              </div>
            </div>
          </div>
        )}

        {/* ════════════ EDIT OPENING BALANCE MODAL ════════════ */}
        {showOB&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:9998,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div style={{background:"#fff",borderRadius:"22px 22px 0 0",padding:"24px 18px 36px",width:"100%",maxWidth:430}}>
              <div style={{width:40,height:4,background:"#e2e8f0",borderRadius:2,margin:"0 auto 16px"}}/>
              <div style={{fontSize:16,fontWeight:900,color:"#1a3a6b",fontFamily:"Georgia,serif",marginBottom:18}}>✏️ Edit Opening Balance</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
                {[{l:"💵 Opening Cash",v:obCash,set:setObCash,col:"#22c55e",bg:"#f0fdf4"},{l:"🏦 Opening Bank",v:obBank,set:setObBank,col:"#3b82f6",bg:"#eff6ff"}].map(({l,v,set,col,bg})=>(
                  <div key={l}>
                    <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",marginBottom:6}}>{l}</div>
                    <input type="number" inputMode="decimal" value={v} onChange={e=>set(e.target.value)} placeholder="0"
                      style={{width:"100%",border:"2px solid "+col,borderRadius:10,padding:"12px",fontSize:16,outline:"none",fontFamily:"Georgia,serif",textAlign:"right",boxSizing:"border-box",fontWeight:800,background:bg}}/>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setShowOB(false)} style={{flex:1,padding:"13px",borderRadius:12,background:"#f8fafc",border:"1.5px solid #e2e8f0",color:"#64748b",fontSize:14,cursor:"pointer"}}>Cancel</button>
                <button onClick={saveOB} style={{flex:2,padding:"13px",borderRadius:12,background:"linear-gradient(90deg,#1a3a6b,#2563eb)",border:"none",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"Georgia,serif"}}>Save Balance</button>
              </div>
            </div>
          </div>
        )}

        {/* ════════════ CLOSING BALANCE MODAL ════════════ */}
        {showCL&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:9998,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
            <div style={{background:"#fff",borderRadius:20,padding:"22px 18px 24px",width:"100%",maxWidth:380,boxShadow:"0 20px 60px rgba(0,0,0,0.25)"}}>
              <div style={{fontSize:15,fontWeight:900,color:"#1a3a6b",fontFamily:"Georgia,serif",marginBottom:4}}>📊 Enter Closing Balance</div>
              <div style={{fontSize:12,color:"#94a3b8",marginBottom:16}}>Enter physically counted amounts to compare</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                {[
                  {l:"💵 Cash in Hand",  v:clCash, set:setClCash, calc:c.calcCash, col:"#22c55e",bg:"#f0fdf4"},
                  {l:"🏦 Bank Balance",  v:clBank, set:setClBank, calc:c.calcBank, col:"#3b82f6",bg:"#eff6ff"},
                ].map(({l,v,set,calc,col,bg})=>(
                  <div key={l}>
                    <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",marginBottom:5}}>{l}</div>
                    <input type="number" inputMode="decimal" value={v} onChange={e=>set(e.target.value)} placeholder={fmtN(calc)}
                      style={{width:"100%",border:"2px solid "+col,borderRadius:10,padding:"12px",fontSize:16,outline:"none",fontFamily:"Georgia,serif",textAlign:"right",boxSizing:"border-box",fontWeight:800,background:bg}}/>
                    <div style={{fontSize:10,color:"#64748b",marginTop:3}}>Calc: {calc>=0?"+":"-"}{fmtN(Math.abs(calc))}</div>
                  </div>
                ))}
              </div>
              {(clCash||clBank)&&(
                <div style={{background:"#f8fafc",borderRadius:10,padding:"10px 12px",marginBottom:14,border:"1px solid #e2e8f0"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",marginBottom:6}}>Difference</div>
                  {[{l:"Cash",ent:parseFloat(clCash),calc:c.calcCash},{l:"Bank",ent:parseFloat(clBank),calc:c.calcBank}].map(({l,ent,calc})=>{
                    const diff = (isNaN(ent)?calc:ent) - calc;
                    return (
                      <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                        <span style={{fontSize:12,color:"#64748b"}}>{l}</span>
                        <span style={{fontSize:12,fontWeight:800,color:diff===0?"#64748b":diff>0?"#16a34a":"#dc2626"}}>{diff>=0?"+":""}{fmtN(diff)}</span>
                      </div>
                    );
                  })}
                </div>
              )}
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setShowCL(false)} style={{flex:1,padding:"12px",borderRadius:11,background:"#f8fafc",border:"1.5px solid #e2e8f0",color:"#64748b",fontSize:13,cursor:"pointer"}}>Cancel</button>
                <button onClick={saveCL} style={{flex:2,padding:"12px",borderRadius:11,background:"linear-gradient(90deg,#1a3a6b,#2563eb)",border:"none",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"Georgia,serif"}}>Save Closing</button>
              </div>
            </div>
          </div>
        )}

        {/* ════════════ WEEK HEADER ════════════ */}
        <div style={{background:"linear-gradient(135deg,#1a3a6b,#2563eb)",padding:"14px 14px 0"}}>
          {/* top row */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <button onClick={()=>{setScreen("list");setActiveWkId(null);}}
              style={{background:"rgba(255,255,255,0.18)",border:"1.5px solid rgba(255,255,255,0.3)",color:"#fff",fontSize:20,cursor:"pointer",borderRadius:10,padding:"5px 13px",lineHeight:1}}>&#8592;</button>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:900,color:"#fff",fontFamily:"Georgia,serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{wk.label}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.65)"}}>Starts {fmtDate(wk.startDate)}</div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{
                const txt = buildCashBookText(wk, calc);
                const menu = document.createElement("div");
                menu.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99999;display:flex;align-items:flex-end;justify-content:center";
                menu.innerHTML = `<div style="background:#fff;border-radius:22px 22px 0 0;padding:22px 18px 34px;width:100%;max-width:430px">
                  <div style="width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 16px"></div>
                  <div style="font-size:15px;font-weight:900;color:#1a3a6b;font-family:Georgia,serif;margin-bottom:16px">📤 Share Cash Book</div>
                  <div style="display:flex;flex-direction:column;gap:10px">
                    <button id="cb-text" style="padding:13px;border-radius:12px;background:#f0fdf4;border:1.5px solid #22c55e;color:#15803d;font-size:14px;font-weight:800;cursor:pointer;text-align:left">📝 Share as Text</button>
                    <button id="cb-png" style="padding:13px;border-radius:12px;background:#eff6ff;border:1.5px solid #3b82f6;color:#1d4ed8;font-size:14px;font-weight:800;cursor:pointer;text-align:left">🖼️ Save as PNG Image</button>
                    <button id="cb-cancel" style="padding:13px;border-radius:12px;background:#f8fafc;border:1.5px solid #e2e8f0;color:#64748b;font-size:14px;cursor:pointer">Cancel</button>
                  </div>
                </div>`;
                document.body.appendChild(menu);
                document.getElementById("cb-text").onclick = () => { shareText(txt,"Cash Book — "+wk.label); menu.remove(); };
                document.getElementById("cb-png").onclick  = () => { menu.remove(); setTimeout(()=>shareAsImage("cashbook-week-body","cashbook-"+wk.id),100); };
                document.getElementById("cb-cancel").onclick = () => menu.remove();
                menu.onclick = (e) => { if(e.target===menu) menu.remove(); };
              }} style={{background:"rgba(255,255,255,0.18)",border:"1px solid rgba(255,255,255,0.35)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",borderRadius:9,padding:"7px 10px"}}>📤</button>
              {isOpen
                ?<button onClick={()=>setShowClose(true)} style={{background:"rgba(255,255,255,0.18)",border:"1px solid rgba(255,255,255,0.35)",color:"#fff",fontSize:11,fontWeight:800,cursor:"pointer",borderRadius:9,padding:"7px 12px"}}>🔒 Close</button>
                :<span style={{background:"rgba(22,163,74,0.35)",borderRadius:8,padding:"5px 10px",fontSize:10,fontWeight:800,color:"#86efac"}}>✅ CLOSED</span>
              }
            </div>
          </div>

          {/* ── 3 live balance tiles ── */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,paddingBottom:14}}>
            {[
              {l:"💵 In Cash",  v:c.calcCash},
              {l:"🏦 In Bank",  v:c.calcBank},
              {l:"⚖️ Balance",  v:c.balance},
            ].map(({l,v})=>(
              <div key={l} style={{background:"rgba(0,0,0,0.22)",borderRadius:12,padding:"10px 8px",border:"1px solid rgba(255,255,255,0.12)",textAlign:"center"}}>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.6)",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>{l}</div>
                <div style={{fontSize:14,fontWeight:900,color:v>=0?"#86efac":"#fca5a5",fontFamily:"Georgia,serif"}}>{v<0?"-":""}{fmtN(Math.abs(v))}</div>
              </div>
            ))}
          </div>
        </div>

        {/* ════════════ BODY ════════════ */}
        <div id="cashbook-week-body" style={{padding:"10px 10px 20px"}}>

          {/* auto-sync banner */}
          {autoCount>0&&(
            <div style={{background:"linear-gradient(90deg,#dbeafe,#eff6ff)",borderRadius:11,padding:"9px 14px",marginBottom:10,border:"1px solid #bfdbfe",display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:16}}>🔄</span>
              <div>
                <div style={{fontSize:11,fontWeight:800,color:"#1d4ed8"}}>Auto-Synced from Reports</div>
                <div style={{fontSize:10,color:"#3b82f6"}}>{autoCount} entries auto-added · Cash & Bank</div>
              </div>
            </div>
          )}

          {/* ── A. OPENING BALANCE ── */}
          <div style={{background:"#fff",borderRadius:14,border:"1px solid #e2e8f0",overflow:"hidden",marginBottom:10,boxShadow:"0 1px 6px rgba(0,0,0,0.04)"}}>
            <div style={{background:"linear-gradient(90deg,#334155,#64748b)",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:12,fontWeight:800,color:"#fff"}}>🏁 Opening Balance</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.6)"}}>Starting amounts for this week</div>
              </div>
              {isOpen&&<button onClick={()=>{setObCash(wk.openingCash!=null?String(wk.openingCash):"");setObBank(wk.openingBank!=null?String(wk.openingBank):"");setShowOB(true);}}
                style={{background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.35)",color:"#fff",fontSize:11,fontWeight:700,borderRadius:8,padding:"5px 11px",cursor:"pointer"}}>✏️ Edit</button>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
              <div style={{padding:"14px 16px",textAlign:"center",borderRight:"1px solid #f1f5f9"}}>
                <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",marginBottom:5}}>💵 Cash</div>
                <div style={{fontSize:20,fontWeight:900,color:"#15803d",fontFamily:"Georgia,serif"}}>{fmtN(wk.openingCash||0)}</div>
              </div>
              <div style={{padding:"14px 16px",textAlign:"center"}}>
                <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",marginBottom:5}}>🏦 Bank</div>
                <div style={{fontSize:20,fontWeight:900,color:"#1d4ed8",fontFamily:"Georgia,serif"}}>{fmtN(wk.openingBank||0)}</div>
              </div>
            </div>
          </div>

          {/* ── B. COLLECTIONS & INCOME (Credits) ── */}
          <div style={{background:"#fff",borderRadius:14,border:"1px solid #dcfce7",overflow:"hidden",marginBottom:10,boxShadow:"0 1px 6px rgba(0,0,0,0.04)"}}>
            <div style={{background:"linear-gradient(90deg,#15803d,#22c55e)",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:12,fontWeight:800,color:"#fff"}}>➕ வரவு — Collections & Income</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.7)"}}>All cash inflows this week</div>
              </div>
              {isOpen&&(
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>openNewEntry("collection","+")} style={{background:"rgba(255,255,255,0.25)",border:"1px solid rgba(255,255,255,0.4)",color:"#fff",fontSize:11,fontWeight:800,borderRadius:8,padding:"5px 10px",cursor:"pointer"}}>+</button>
                </div>
              )}
            </div>

            {/* mini breakdown bar */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",background:"#f0fdf4",borderBottom:"1px solid #dcfce7"}}>
              {[
                {l:"Coll Cash", v:c.collCashIn},
                {l:"Coll Bank", v:c.collBankIn},
                {l:"Inc Cash",  v:c.incCashIn},
                {l:"Inc Bank",  v:c.incBankIn},
              ].map(({l,v},i)=>(
                <div key={l} style={{padding:"7px 6px",textAlign:"center",borderRight:i<3?"1px solid #dcfce7":"none"}}>
                  <div style={{fontSize:8,fontWeight:700,color:"#64748b",textTransform:"uppercase",marginBottom:1}}>{l}</div>
                  <div style={{fontSize:11,fontWeight:800,color:v>0?"#16a34a":"#94a3b8",fontFamily:"Georgia,serif"}}>{fmtN(v)}</div>
                </div>
              ))}
            </div>

            {(wk.entries||[]).filter(e=>e.sign==="+").length===0
              ? <div style={{padding:"18px",textAlign:"center",color:"#94a3b8",fontSize:12,fontStyle:"italic"}}>No credit entries yet — tap + to add</div>
              : (wk.entries||[]).filter(e=>e.sign==="+").map(e=><ERow key={e.id} e={e}/>)
            }

            <div style={{padding:"10px 14px",background:"#f0fdf4",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:12,fontWeight:700,color:"#64748b"}}>Total Credits</span>
              <span style={{fontSize:16,fontWeight:900,color:"#16a34a",fontFamily:"Georgia,serif"}}>+{fmtN(c.totCredits)}</span>
            </div>
          </div>

          {/* ── C. EXPENSES & DEBITS ── */}
          <div style={{background:"#fff",borderRadius:14,border:"1px solid #fee2e2",overflow:"hidden",marginBottom:10,boxShadow:"0 1px 6px rgba(0,0,0,0.04)"}}>
            <div style={{background:"linear-gradient(90deg,#b91c1c,#dc2626)",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:12,fontWeight:800,color:"#fff"}}>➖ செலவு — Expenses & Debits</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.7)"}}>All cash outflows this week</div>
              </div>
              {isOpen&&<button onClick={()=>openNewEntry("expense","-")} style={{background:"rgba(255,255,255,0.25)",border:"1px solid rgba(255,255,255,0.4)",color:"#fff",fontSize:11,fontWeight:800,borderRadius:8,padding:"5px 10px",cursor:"pointer"}}>+</button>}
            </div>

            {/* expense breakdown */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",background:"#fff5f5",borderBottom:"1px solid #fee2e2"}}>
              {[{l:"💵 Cash Expenses",v:c.expCash},{l:"🏦 Bank Expenses",v:c.expBank}].map(({l,v},i)=>(
                <div key={l} style={{padding:"8px 10px",textAlign:"center",borderRight:i===0?"1px solid #fee2e2":"none"}}>
                  <div style={{fontSize:9,fontWeight:700,color:"#64748b",textTransform:"uppercase",marginBottom:1}}>{l}</div>
                  <div style={{fontSize:12,fontWeight:800,color:v>0?"#dc2626":"#94a3b8",fontFamily:"Georgia,serif"}}>{fmtN(v)}</div>
                </div>
              ))}
            </div>

            {(wk.entries||[]).filter(e=>e.sign==="-").length===0
              ? <div style={{padding:"18px",textAlign:"center",color:"#94a3b8",fontSize:12,fontStyle:"italic"}}>No expense entries yet — tap + to add</div>
              : (wk.entries||[]).filter(e=>e.sign==="-").map(e=><ERow key={e.id} e={e}/>)
            }

            <div style={{padding:"10px 14px",background:"#fff5f5",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:12,fontWeight:700,color:"#64748b"}}>Total Expenses</span>
              <span style={{fontSize:16,fontWeight:900,color:"#dc2626",fontFamily:"Georgia,serif"}}>-{fmtN(c.totDebits)}</span>
            </div>
          </div>

          {/* ── D. WEEKLY TALLY ── */}
          <div style={{background:"#fff",borderRadius:14,border:"2px solid "+(c.balance>=0?"#22c55e":"#dc2626"),overflow:"hidden",marginBottom:10,boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>
            <div style={{background:c.balance>=0?"linear-gradient(90deg,#15803d,#22c55e)":"linear-gradient(90deg,#b91c1c,#dc2626)",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:13,fontWeight:800,color:"#fff",fontFamily:"Georgia,serif"}}>📊 Weekly Tally</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.7)"}}>வாராந்திர கணக்கு</div>
              </div>
              {isOpen&&<button onClick={()=>{setClCash(wk.closingCash!=null?String(wk.closingCash):"");setClBank(wk.closingBank!=null?String(wk.closingBank):"");setShowCL(true);}}
                style={{background:"rgba(255,255,255,0.22)",border:"1px solid rgba(255,255,255,0.4)",color:"#fff",fontSize:11,fontWeight:800,borderRadius:8,padding:"5px 11px",cursor:"pointer"}}>✏️ Closing</button>}
            </div>

            <div style={{padding:"14px"}}>
              {/* CASH block */}
              <div style={{background:"#f0fdf4",borderRadius:12,padding:"12px 14px",marginBottom:10,border:"1px solid #86efac"}}>
                <div style={{fontSize:10,fontWeight:800,color:"#15803d",textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>💵 CASH ACCOUNT</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",rowGap:6,marginBottom:10}}>
                  {[
                    {l:"Opening Cash", v:c.opCash,   col:"#475569"},
                    {l:"(+) Cash In",  v:c.cashIn,   col:"#16a34a"},
                    {l:"(−) Cash Out", v:c.cashOut,  col:"#dc2626"},
                    {l:"= Calculated", v:c.calcCash, col:c.calcCash>=0?"#16a34a":"#dc2626",bold:true},
                  ].map(({l,v,col,bold})=>(
                    <React.Fragment key={l}>
                      <span style={{fontSize:12,color:"#64748b",alignSelf:"center"}}>{l}</span>
                      <span style={{fontSize:12,fontWeight:bold?900:700,color:col,fontFamily:"Georgia,serif",textAlign:"right"}}>{v<0?"-":""}{fmtN(Math.abs(v))}</span>
                    </React.Fragment>
                  ))}
                </div>
                {/* Calculated vs Actual */}
                <div style={{background:"#fff",borderRadius:9,padding:"9px 11px",border:"1.5px solid "+(c.diffCash===0?"#86efac":c.diffCash>0?"#fde68a":"#fca5a5"),display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:9,color:"#64748b",marginBottom:2}}>Calculated</div>
                    <div style={{fontSize:13,fontWeight:800,color:c.calcCash>=0?"#16a34a":"#dc2626",fontFamily:"Georgia,serif"}}>{c.calcCash>=0?"+":"-"}{fmtN(Math.abs(c.calcCash))}</div>
                  </div>
                  <div style={{textAlign:"center"}}>
                    {c.diffCash!==0
                      ?<span style={{fontSize:10,fontWeight:800,background:c.diffCash>0?"#fef9c3":"#fff0f0",color:c.diffCash>0?"#92400e":"#dc2626",borderRadius:6,padding:"3px 8px"}}>{c.diffCash>0?"▲ +":"▼ "}{fmtN(c.diffCash)}</span>
                      :wk.closingCash!=null&&<span style={{fontSize:10,color:"#16a34a",fontWeight:800}}>✓ Match</span>
                    }
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:9,color:"#64748b",marginBottom:2}}>Actual</div>
                    <div style={{fontSize:15,fontWeight:900,color:c.clCashV>=0?"#16a34a":"#dc2626",fontFamily:"Georgia,serif"}}>{c.clCashV>=0?"+":"-"}{fmtN(Math.abs(c.clCashV))}</div>
                  </div>
                </div>
              </div>

              {/* BANK block */}
              <div style={{background:"#eff6ff",borderRadius:12,padding:"12px 14px",marginBottom:10,border:"1px solid #bfdbfe"}}>
                <div style={{fontSize:10,fontWeight:800,color:"#1d4ed8",textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>🏦 BANK ACCOUNT</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",rowGap:6,marginBottom:10}}>
                  {[
                    {l:"Opening Bank", v:c.opBank,    col:"#475569"},
                    {l:"(+) Bank In",  v:c.bankIn,    col:"#16a34a"},
                    {l:"(−) Bank Out", v:c.bankOut,   col:"#dc2626"},
                    {l:"= Calculated", v:c.calcBank,  col:c.calcBank>=0?"#16a34a":"#dc2626",bold:true},
                  ].map(({l,v,col,bold})=>(
                    <React.Fragment key={l}>
                      <span style={{fontSize:12,color:"#64748b",alignSelf:"center"}}>{l}</span>
                      <span style={{fontSize:12,fontWeight:bold?900:700,color:col,fontFamily:"Georgia,serif",textAlign:"right"}}>{v<0?"-":""}{fmtN(Math.abs(v))}</span>
                    </React.Fragment>
                  ))}
                </div>
                <div style={{background:"#fff",borderRadius:9,padding:"9px 11px",border:"1.5px solid "+(c.diffBank===0?"#bfdbfe":c.diffBank>0?"#fde68a":"#fca5a5"),display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:9,color:"#64748b",marginBottom:2}}>Calculated</div>
                    <div style={{fontSize:13,fontWeight:800,color:c.calcBank>=0?"#16a34a":"#dc2626",fontFamily:"Georgia,serif"}}>{c.calcBank>=0?"+":"-"}{fmtN(Math.abs(c.calcBank))}</div>
                  </div>
                  <div style={{textAlign:"center"}}>
                    {c.diffBank!==0
                      ?<span style={{fontSize:10,fontWeight:800,background:c.diffBank>0?"#fef9c3":"#fff0f0",color:c.diffBank>0?"#92400e":"#dc2626",borderRadius:6,padding:"3px 8px"}}>{c.diffBank>0?"▲ +":"▼ "}{fmtN(c.diffBank)}</span>
                      :wk.closingBank!=null&&<span style={{fontSize:10,color:"#16a34a",fontWeight:800}}>✓ Match</span>
                    }
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:9,color:"#64748b",marginBottom:2}}>Actual</div>
                    <div style={{fontSize:15,fontWeight:900,color:c.clBankV>=0?"#1d4ed8":"#dc2626",fontFamily:"Georgia,serif"}}>{c.clBankV>=0?"+":"-"}{fmtN(Math.abs(c.clBankV))}</div>
                  </div>
                </div>
              </div>

              {/* NET RESULT */}
              <div style={{background:c.balance>=0?"linear-gradient(135deg,#f0fdf4,#dcfce7)":"linear-gradient(135deg,#fff0f0,#fca5a5)",borderRadius:13,padding:"16px",border:"2px solid "+(c.balance>=0?"#22c55e":"#dc2626"),textAlign:"center"}}>
                <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Net Weekly Balance</div>
                <div style={{fontSize:34,fontWeight:900,color:c.balance>=0?"#16a34a":"#dc2626",fontFamily:"Georgia,serif",marginBottom:8}}>{c.balance>=0?"+":""}{fmtN(c.balance)}</div>
                <div style={{display:"flex",justifyContent:"center",gap:24,marginBottom:6}}>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:9,color:"#64748b",textTransform:"uppercase",marginBottom:2}}>Cash</div>
                    <div style={{fontSize:13,fontWeight:800,color:c.calcCash>=0?"#16a34a":"#dc2626",fontFamily:"Georgia,serif"}}>{c.calcCash>=0?"+":"-"}{fmtN(Math.abs(c.calcCash))}</div>
                  </div>
                  <div style={{width:1,background:"#e2e8f0"}}/>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:9,color:"#64748b",textTransform:"uppercase",marginBottom:2}}>Bank</div>
                    <div style={{fontSize:13,fontWeight:800,color:c.calcBank>=0?"#16a34a":"#dc2626",fontFamily:"Georgia,serif"}}>{c.calcBank>=0?"+":"-"}{fmtN(Math.abs(c.calcBank))}</div>
                  </div>
                </div>
                {(c.diffCash!==0||c.diffBank!==0)
                  ?<div style={{fontSize:12,fontWeight:800,color:(c.diffCash+c.diffBank)>0?"#92400e":"#dc2626",background:(c.diffCash+c.diffBank)>0?"#fef9c3":"#ffe4e6",borderRadius:8,padding:"5px 12px",display:"inline-block"}}>
                    {(c.diffCash+c.diffBank)>0?"▲ Surplus":"▼ Shortfall"}: {fmtN(Math.abs(c.diffCash+c.diffBank))}
                  </div>
                  :wk.closingCash!=null&&<div style={{fontSize:11,color:"#16a34a",fontWeight:800}}>✅ Balanced — Tally Matches</div>
                }
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ═══════════════════════════════════════ WEEK LIST SCREEN ═══ */
  return (
    <div style={{background:"#f1f5f9",minHeight:"100vh",maxWidth:430,margin:"0 auto",paddingBottom:inline?80:20}}>

      {/* ════════ NEW WEEK MODAL ════════ */}
      {showNew&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:9999,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:"22px 22px 0 0",padding:"22px 18px 38px",width:"100%",maxWidth:430,boxShadow:"0 -8px 40px rgba(0,0,0,0.25)",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{width:40,height:4,borderRadius:2,background:"#e2e8f0",margin:"0 auto 18px"}}/>
            <div style={{fontSize:18,fontWeight:900,color:"#1a3a6b",fontFamily:"Georgia,serif",marginBottom:20}}>📅 New Weekly Account</div>

            {/* Week start date */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",marginBottom:6}}>📆 Week Start Date</div>
              <input type="date" value={nwDate} onChange={e=>{setNwDate(e.target.value);setNwLblIdx(0);}}
                style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:11,padding:"11px 13px",fontSize:14,outline:"none",fontFamily:"Georgia,serif",boxSizing:"border-box",color:"#0f172a"}}/>
            </div>

            {/* Week label */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",marginBottom:6}}>🏷️ Week Label</div>
              <select value={nwLblIdx} onChange={e=>setNwLblIdx(parseInt(e.target.value))}
                style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:11,padding:"11px 13px",fontSize:13,outline:"none",background:"#fff",color:"#0f172a",boxSizing:"border-box",fontFamily:"Georgia,serif"}}>
                {weekLabels.map((l,i)=><option key={i} value={i}>{l}</option>)}
              </select>
            </div>

            {/* Opening balances */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",marginBottom:8}}>🏁 Opening Balances</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[
                  {l:"💵 Cash",v:nwCash,set:setNwCash,col:"#22c55e",bg:"#f0fdf4"},
                  {l:"🏦 Bank",v:nwBank,set:setNwBank,col:"#3b82f6",bg:"#eff6ff"},
                ].map(({l,v,set,col,bg})=>(
                  <div key={l}>
                    <div style={{fontSize:10,color:"#64748b",marginBottom:4}}>{l}</div>
                    <input type="number" inputMode="decimal" value={v} onChange={e=>set(e.target.value)} placeholder="0"
                      style={{width:"100%",border:"2px solid "+col,borderRadius:11,padding:"11px",fontSize:16,outline:"none",fontFamily:"Georgia,serif",textAlign:"right",boxSizing:"border-box",fontWeight:800,background:bg}}/>
                  </div>
                ))}
              </div>
            </div>

            {/* Preview */}
            <div style={{background:"#f0f4ff",borderRadius:12,padding:"12px 14px",marginBottom:16,border:"1px solid #bfdbfe"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",marginBottom:4}}>Preview</div>
              <div style={{fontSize:13,fontWeight:800,color:"#1a3a6b",fontFamily:"Georgia,serif"}}>{weekLabels[nwLblIdx]||"—"}</div>
              <div style={{fontSize:11,color:"#64748b",marginTop:3}}>💵 {fmtN(+nwCash||0)} · 🏦 {fmtN(+nwBank||0)}</div>
            </div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowNew(false)} style={{flex:1,padding:"13px",borderRadius:12,background:"#f8fafc",border:"1.5px solid #e2e8f0",color:"#64748b",fontSize:14,cursor:"pointer"}}>Cancel</button>
              <button onClick={createWeek} style={{flex:2,padding:"13px",borderRadius:12,background:"linear-gradient(90deg,#1a3a6b,#2563eb)",border:"none",color:"#fff",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"Georgia,serif"}}>✅ Create Week</button>
            </div>
          </div>
        </div>
      )}

      {/* ════════ HEADER ════════ */}
      <div style={{background:"linear-gradient(135deg,#1a3a6b,#2563eb)",padding:"14px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div>
            <div style={{fontSize:19,fontWeight:900,color:"#fff",fontFamily:"Georgia,serif"}}>📒 Cash Book</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.65)"}}>கேஷ் புத்தகம் · Starts {WEEK_DAYS[startDay]}</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>onOpenSettings&&onOpenSettings()} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",borderRadius:10,padding:"8px 12px",fontSize:14,cursor:"pointer"}}>⚙️</button>
            <button onClick={()=>{setNwDate(getWeekStart());setNwLblIdx(0);setShowNew(true);}}
              style={{background:"rgba(255,255,255,0.22)",border:"1.5px solid rgba(255,255,255,0.4)",color:"#fff",borderRadius:20,padding:"9px 16px",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"Georgia,serif"}}>+ New Week</button>
          </div>
        </div>

        {/* aggregate balance tiles */}
        {weeks.length>0&&(()=>{
          const all   = weeks.map(w=>calc(w));
          const tCash = all.reduce((s,c)=>s+c.calcCash,0);
          const tBank = all.reduce((s,c)=>s+c.calcBank,0);
          return (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
              {[{l:"💵 Cash Balance",v:tCash},{l:"🏦 Bank Balance",v:tBank},{l:"⚖️ Total Balance",v:tCash+tBank}].map(({l,v})=>(
                <div key={l} style={{background:"rgba(0,0,0,0.2)",borderRadius:11,padding:"10px 8px",border:"1px solid rgba(255,255,255,0.12)",textAlign:"center"}}>
                  <div style={{fontSize:8,color:"rgba(255,255,255,0.6)",fontWeight:700,textTransform:"uppercase",marginBottom:3}}>{l}</div>
                  <div style={{fontSize:13,fontWeight:900,color:v>=0?"#86efac":"#fca5a5",fontFamily:"Georgia,serif"}}>{v<0?"-":""}{fmtN(Math.abs(v))}</div>
                </div>
              ))}
            </div>
          );
        })()}
      </div>

      {/* ════════ WEEK CARDS ════════ */}
      <div style={{padding:"12px 10px"}}>
        {weeks.length===0?(
          <div style={{textAlign:"center",padding:"64px 20px"}}>
            <div style={{fontSize:64,marginBottom:16}}>📒</div>

// ── SwipeCard — swipe left to reveal Delete/Edit actions ─────────────────────
function SwipeCard({ children, onEdit, onDelete }) {
  const [offset, setOffset] = useState(0);
  const [dragging, setDragging] = useState(false);
  const startX = useState(null);
  const ACTION_W = 140; // total width of revealed actions
  const SNAP_THRESHOLD = 60;

  const getClientX = e => e.touches ? e.touches[0].clientX : e.clientX;

  const onStart = e => {
    startX[1](getClientX(e));
    setDragging(true);
  };

  const onMove = e => {
    if (!dragging || startX[0] === null) return;
    const dx = getClientX(e) - startX[0];
    // Only allow left swipe (negative dx)
    const clamped = Math.max(-ACTION_W, Math.min(0, dx + offset));
    // But if offset is already open, allow drag from there
    setOffset(Math.max(-ACTION_W, Math.min(0, dx + (offset === -ACTION_W ? -ACTION_W : 0))));
  };

  const onEnd = e => {
    setDragging(false);
    if (offset < -SNAP_THRESHOLD) {
      setOffset(-ACTION_W);
    } else {
      setOffset(0);
    }
  };

  const close = () => setOffset(0);

  return (
    <div style={{position:"relative",overflow:"hidden",borderRadius:15,marginBottom:9}}>
      {/* Action buttons behind the card */}
      <div style={{position:"absolute",top:0,right:0,bottom:0,width:ACTION_W,display:"flex",borderRadius:"0 15px 15px 0"}}>
        <button
          onClick={()=>{close();onEdit();}}
          style={{flex:1,background:"#2563eb",border:"none",color:"#fff",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:5,borderRadius:0}}>
          <span style={{fontSize:22}}>✏️</span>
          <span style={{fontSize:12,fontWeight:800,letterSpacing:0.3}}>Edit</span>
        </button>
        <button
          onClick={()=>{close();onDelete();}}
          style={{flex:1,background:"#dc2626",border:"none",color:"#fff",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:5,borderRadius:"0 15px 15px 0"}}>
          <span style={{fontSize:22}}>🗑️</span>
          <span style={{fontSize:12,fontWeight:800,letterSpacing:0.3}}>Delete</span>
        </button>
      </div>

      {/* Card content — slides left */}
      <div
        onTouchStart={onStart}
        onTouchMove={onMove}
        onTouchEnd={onEnd}
        onMouseDown={onStart}
        onMouseMove={onMove}
        onMouseUp={onEnd}
        onMouseLeave={onEnd}
        style={{
          transform:"translateX("+offset+"px)",
          transition:dragging?"none":"transform 0.25s cubic-bezier(.4,0,.2,1)",
          position:"relative",
          zIndex:1,
          userSelect:"none",
          touchAction:"pan-y",
        }}>
        {children}
      </div>

      {/* Tap-away overlay to close when open */}
      {offset<0&&(
        <div
          onClick={close}
          style={{position:"fixed",inset:0,zIndex:0}}
        />
      )}
    </div>
  );
}

// ── Root App ───────────────────────────────────────────────────────────────────
export default function App() {
  const [screen,    setScreen]    = useState("home");
  const [storedPin, setStoredPin] = useState("");
  const [areas,     setAreas]     = useState(DEFAULT_AREAS);
  const [reports,   setReports]   = useState([]);
  const [activeId,  setActiveId]  = useState(null);
  const [showNew,   setShowNew]   = useState(false);
  const [showArea,  setShowArea]  = useState(false);
  const [deleteId,  setDeleteId]  = useState(null);
  const [weekStartDay, setWeekStartDay] = useState(0); // 0=Sun,1=Mon,...,6=Sat
  const [weeks,        setWeeks]        = useState([]);  // lifted for auto-sync

  const activeReport=reports.find(r=>r.id===activeId);

  // ── Auto-sync: when a new report is saved, inject cash/bank entries into matching week ──
  const syncReportToWeek = (report) => {
    const rc = calcR(report);
    const rDate = report.date;
    setWeeks(prevWeeks => {
      // Find open week whose range contains report.date
      let targetWk = prevWeeks.find(w => {
        if (w.closed) return false;
        const wEnd = new Date(w.startDate); wEnd.setDate(wEnd.getDate()+6);
        const wEndISO = wEnd.toISOString().slice(0,10);
        return rDate >= w.startDate && rDate <= wEndISO;
      });

      // AUTO-CREATE week if none exists for this report date
      if (!targetWk) {
        const d = new Date(rDate);
        const diff = (d.getDay() - weekStartDay + 7) % 7;
        d.setDate(d.getDate() - diff);
        const wStart = d.toISOString().slice(0,10);
        // Check again for any week starting on that date
        targetWk = prevWeeks.find(w => w.startDate === wStart);
        if (!targetWk) {
          const MONTHS_S = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
          const DAYS_S   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
          const wEnd2 = new Date(d); wEnd2.setDate(d.getDate()+6);
          const lbl = DAYS_S[d.getDay()]+" "+String(d.getDate()).padStart(2,"0")+" "+MONTHS_S[d.getMonth()]+" → "+DAYS_S[wEnd2.getDay()]+" "+String(wEnd2.getDate()).padStart(2,"0")+" "+MONTHS_S[wEnd2.getMonth()]+" "+wEnd2.getFullYear();
          targetWk = {id: Date.now()+Math.random(), label: lbl, startDate: wStart, openingCash: null, openingBank: null, entries: [], closed: false, autoCreated: true};
          prevWeeks = [...prevWeeks, targetWk];
        }
      }
      // Remove old auto-entries from this report (re-sync)
      const filtered = targetWk.entries.filter(e => e.sourceReportId !== report.id);
      // Build new auto-entries
      const newEntries = [];
      if (rc.cashCD !== 0) newEntries.push({
        id: report.id + "_cash_" + Date.now(),
        type: "collection", sign: rc.cashCD >= 0 ? "+" : "-",
        desc: report.area + " Cash", amount: Math.abs(rc.cashCD),
        account: "cash", category: "collection", date: rDate,
        fromReport: true, reportId: report.id + "_cash",
        sourceReportId: report.id, auto: true,
      });
      if (rc.bankCD !== 0) newEntries.push({
        id: report.id + "_bank_" + Date.now(),
        type: "collection", sign: rc.bankCD >= 0 ? "+" : "-",
        desc: report.area + " Bank", amount: Math.abs(rc.bankCD),
        account: "bank", category: "collection", date: rDate,
        fromReport: true, reportId: report.id + "_bank",
        sourceReportId: report.id, auto: true,
      });
      const updatedWk = {...targetWk, entries: [...filtered, ...newEntries]};
      return prevWeeks.map(w => w.id === targetWk.id ? updatedWk : w);
    });
  };

  if(screen==="pin")      return <PinScreen mode="verify" storedPin={storedPin} onSuccess={()=>setScreen("home")}/>;
  if(screen==="security") return <SecurityScreen storedPin={storedPin} onPinSet={p=>{setStoredPin(p);setScreen("home");}} onPinRemove={()=>{setStoredPin("");setScreen("home");}} onClose={()=>setScreen("home")}/>;
  if(screen==="gdrive")   return <GoogleDriveScreen reports={reports} areas={areas} onRestore={d=>setReports(d)} onClose={()=>setScreen("home")}/>
  if(screen==="weeksetting") return <WeekSettingScreen current={weekStartDay} onChange={d=>{setWeekStartDay(d);setScreen("home");}} onClose={()=>setScreen("home")}/>;;

  if(screen==="report"&&activeReport){
    return (
      <ReportView
        report={activeReport}
        onBack={r=>{setReports(p=>p.map(x=>x.id===r.id?r:x));syncReportToWeek(r);setScreen("home");}}
      />
    );
  }

  return (
    <div>
      {/* Delete confirmation dialog */}
      {deleteId&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:9999,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:"22px 22px 0 0",padding:"28px 22px 36px",width:"100%",maxWidth:430,boxShadow:"0 -8px 40px rgba(0,0,0,0.25)"}}>
            <div style={{width:40,height:4,borderRadius:2,background:"#e2e8f0",margin:"0 auto 20px"}}/>
            <div style={{textAlign:"center",marginBottom:22}}>
              <div style={{fontSize:46,marginBottom:10}}>🗑️</div>
              <div style={{fontSize:18,fontWeight:900,color:"#0f172a",fontFamily:"Georgia,serif",marginBottom:8}}>Delete Report?</div>
              <div style={{fontSize:13,color:"#64748b",fontFamily:"Georgia,serif",lineHeight:1.7}}>
                This report will be permanently deleted. This action cannot be undone.
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <button onClick={()=>{setReports(p=>p.filter(r=>r.id!==deleteId));setDeleteId(null);}}
                style={{width:"100%",padding:"15px",borderRadius:14,background:"linear-gradient(90deg,#b91c1c,#dc2626)",border:"none",color:"#fff",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"Georgia,serif"}}>
                Delete Permanently
              </button>
              <button onClick={()=>setDeleteId(null)}
                style={{width:"100%",padding:"15px",borderRadius:14,background:"#fff",border:"2px solid #e2e8f0",color:"#64748b",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif"}}>
                Cancel
              </button>
            </div>
          </div>
        </div>
      )}

      <HomeScreen
        reports={reports}
        areas={areas}
        onOpen={id=>{setActiveId(id);setScreen("report");}}
        onNew={()=>setShowNew(true)}
        onDelete={id=>setDeleteId(id)}
        onManageAreas={()=>setShowArea(true)}
        onSecurity={()=>setScreen("security")}
        onImportExport={()=>alert("Import/Export: Open CSV app, copy all, paste here. Feature in next update.")}
        onGDrive={()=>setScreen("gdrive")}
        weekStartDay={weekStartDay}
        onWeekSetting={()=>setScreen("weeksetting")}
        weeks={weeks}
        setWeeks={setWeeks}
        onNavigate={s=>setScreen(s)}
      />
      {showNew&&<NewReportModal areas={areas} onCreate={r=>{setReports(p=>[...p,r]);syncReportToWeek(r);setActiveId(r.id);setShowNew(false);setScreen("report");}} onClose={()=>setShowNew(false)}/>}
      {showArea&&<AreaManager areas={areas} onSave={a=>{setAreas(a);setShowArea(false);}} onClose={()=>setShowArea(false)}/>}
    </div>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

  </script>

  <!-- PWA Service Worker -->
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{
        // inline SW as blob for file:// protocol support
        const swCode = `
          const CACHE='vasool-v2';
          self.addEventListener('install',e=>{self.skipWaiting();});
          self.addEventListener('activate',e=>{self.clients.claim();});
          self.addEventListener('fetch',e=>{
            e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
          });
        `;
        const blob = new Blob([swCode],{type:'application/javascript'});
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).catch(()=>{});
      });
    }

    // Add to home screen prompt for Android Chrome
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt',(e)=>{
      e.preventDefault();
      deferredPrompt = e;
      // Show install button if not already installed
      const existing = document.getElementById('install-btn');
      if(!existing && !window.matchMedia('(display-mode: standalone)').matches){
        const btn = document.createElement('div');
        btn.id = 'install-btn';
        btn.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a3a6b;color:#fff;padding:12px 24px;border-radius:25px;font-size:13px;font-weight:800;z-index:99999;box-shadow:0 4px 20px rgba(0,0,0,0.3);cursor:pointer;white-space:nowrap;font-family:Georgia,serif;';
        btn.innerHTML = '📲 Install Vasool Book App';
        btn.onclick = ()=>{
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(()=>{ btn.remove(); deferredPrompt=null; });
        };
        document.body.appendChild(btn);
        setTimeout(()=>{ if(btn.parentNode) btn.remove(); }, 15000);
      }
    });
  </script>
