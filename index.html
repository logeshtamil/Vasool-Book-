const { useState, useEffect, useRef } = React;

const C = {
  primary:"#1a3a6b", accent:"#2563eb", success:"#16a34a",
  danger:"#dc2626",  warn:"#d97706",   bg:"#f0f4ff",
  card:"#ffffff",    muted:"#64748b",  border:"#e2e8f0", text:"#0f172a",
};

const getTodayISO = () => {
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
};
const fmtDate = iso => {
  if (!iso) return "";
  const MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const [y,m,d]=iso.split("-");
  return d+" "+MN[parseInt(m,10)-1]+" "+y;
};
const fmtN = n => (n<0?"-":"")+Math.abs(n).toLocaleString("en-IN",{minimumFractionDigits:2});
const fmtN0 = n => (n<0?"-":"")+Math.abs(Math.round(n)).toLocaleString("en-IN");

const mkReport = (area,date) => ({
  id:Date.now(), area:area||"", date:date||getTodayISO(),
  // mandatory fields start null so 0 entry is distinguishable from untouched
  finCash:null, cashOut:null, ctBank:null, dfBank:null,
  food:0, fuel:0, other:0,
  nlAmt:null, misLoan:0, commR:0, intLoan:0,
  wkColl:null, intColl:0, misPay:0, princ:0,
});

const calcR = r => {
  const n = k => (r[k]===null||r[k]===undefined) ? 0 : (r[k]||0);
  const intLess = Math.round(n('nlAmt')*0.20);
  const misLoan = n('misLoan');
  const wkLoan  = n('nlAmt') - intLess - misLoan;
  const comm    = Math.round(wkLoan*0.05);
  const commInc = comm - n('commR');
  const totLoan = wkLoan - comm + n('commR') + n('intLoan');
  const cashCD  = n('cashOut')-n('finCash');
  const bankCD  = n('ctBank')-n('dfBank');
  const cashHand= cashCD+bankCD;
  const totExp  = n('food')+n('fuel')+n('other');
  const resultA = totLoan + cashHand + totExp;
  const totColl = n('wkColl')+n('intColl')-n('misPay');
  const collRes = totColl+n('princ');
  const amtDiff = resultA - collRes;
  const surplus = amtDiff > 0 ? amtDiff : 0;
  const deficit = amtDiff < 0 ? Math.abs(amtDiff) : 0;
  return {intLess,misLoan,wkLoan,comm,commInc,totLoan,cashCD,bankCD,cashHand,totExp,resultA,totColl,collRes,amtDiff,surplus,deficit};
};

const DEFAULT_AREAS = [
  {id:1,name:"BUTHITHITTU"},{id:2,name:"MADIKERI"},
  {id:3,name:"KOPPA"},{id:4,name:"VIRAJPET"},{id:5,name:"KUTTA"},
];

// ── CalendarPicker ─────────────────────────────────────────────────────────────
function CalendarPicker({ value, onChange, onClose }) {
  const init = value ? new Date(value) : new Date();
  const [vw, setVw] = useState({y:init.getFullYear(), m:init.getMonth()});
  const MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const days=["Su","Mo","Tu","We","Th","Fr","Sa"];
  const first=new Date(vw.y,vw.m,1).getDay();
  const total=new Date(vw.y,vw.m+1,0).getDate();
  const cells=Array(first).fill(null).concat(Array.from({length:total},(_,i)=>i+1));
  const sel=value?new Date(value):null;
  const pick=d=>{
    onChange(vw.y+"-"+String(vw.m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0"));
    onClose();
  };
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:9000,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:20,padding:"18px 16px",width:300,boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <button onClick={()=>setVw(v=>v.m===0?{y:v.y-1,m:11}:{...v,m:v.m-1})} style={{background:"#f1f5f9",border:"none",borderRadius:8,padding:"5px 11px",fontSize:14,cursor:"pointer",fontWeight:700}}>{"<"}</button>
          <div style={{fontWeight:800,color:C.primary,fontSize:14}}>{MN[vw.m]} {vw.y}</div>
          <button onClick={()=>setVw(v=>v.m===11?{y:v.y+1,m:0}:{...v,m:v.m+1})} style={{background:"#f1f5f9",border:"none",borderRadius:8,padding:"5px 11px",fontSize:14,cursor:"pointer",fontWeight:700}}>{">"}</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {days.map(d=><div key={d} style={{textAlign:"center",fontSize:9,fontWeight:700,color:C.muted,padding:"3px 0"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {cells.map((d,i)=>{
            if(!d) return <div key={i}/>;
            const isSel=sel&&sel.getFullYear()===vw.y&&sel.getMonth()===vw.m&&sel.getDate()===d;
            return <button key={i} onClick={()=>pick(d)} style={{padding:"7px 0",borderRadius:8,border:"none",fontSize:12,cursor:"pointer",fontWeight:isSel?800:400,background:isSel?C.accent:"transparent",color:isSel?"#fff":C.text}}>{d}</button>;
          })}
        </div>
      </div>
    </div>
  );
}

// ── AreaManager ────────────────────────────────────────────────────────────────
function AreaManager({ areas, onSave, onClose }) {
  const [list,setList]=useState([...areas]);
  const [nm,setNm]=useState("");
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:8500,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:22,padding:"22px 18px",width:340,maxWidth:"94vw",boxShadow:"0 20px 60px rgba(0,0,0,0.25)",maxHeight:"80vh",overflowY:"auto"}}>
        <div style={{fontSize:16,fontWeight:800,color:C.primary,marginBottom:14}}>📍 Manage Areas</div>
        {list.map(a=>(
          <div key={a.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 0",borderBottom:"1px solid #f1f5f9"}}>
            <span style={{flex:1,fontSize:13,fontWeight:600,color:C.text}}>{a.name}</span>
            <button onClick={()=>setList(l=>l.filter(x=>x.id!==a.id))} style={{background:"#fff0f0",border:"1px solid #fca5a5",color:C.danger,borderRadius:7,padding:"4px 9px",fontSize:11,cursor:"pointer"}}>Remove</button>
          </div>
        ))}
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <input value={nm} onChange={e=>setNm(e.target.value)} placeholder="New area name"
            style={{flex:1,border:"1.5px solid "+C.border,borderRadius:9,padding:"8px 11px",fontSize:13,outline:"none"}}/>
          <button onClick={()=>{if(nm.trim()){setList(l=>[...l,{id:Date.now(),name:nm.trim().toUpperCase()}]);setNm("");}}} style={{background:C.accent,border:"none",color:"#fff",borderRadius:9,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Add</button>
        </div>
        <div style={{display:"flex",gap:10,marginTop:14}}>
          <button onClick={onClose} style={{flex:1,padding:"11px",borderRadius:11,background:"#f8fafc",border:"1.5px solid "+C.border,color:C.muted,fontSize:13,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>onSave(list)} style={{flex:2,padding:"11px",borderRadius:11,background:C.accent,border:"none",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Save</button>
        </div>
      </div>
    </div>
  );
}

            <span>📅</span><span style={{flex:1,textAlign:"left"}}>{fmtDate(date)}</span><span style={{fontSize:11,color:C.muted}}>Change</span>
          </button>
        </div>
        <div style={{display:"flex",gap:10}}>

          <button onClick={()=>{if(!selArea)return;onCreate(mkReport(selArea,date));}} disabled={!selArea}
            style={{flex:2,padding:"12px",borderRadius:11,background:selArea?C.accent:"#cbd5e1",border:"none",color:"#fff",fontSize:13,fontWeight:700,cursor:selArea?"pointer":"not-allowed"}}>

// ── PinScreen ──────────────────────────────────────────────────────────────────
function PinScreen({ mode, storedPin, onSuccess }) {
  const [pin,setPin]=useState("");
  const [conf,setConf]=useState("");
  const [step,setStep]=useState(1);
  const [err,setErr]=useState("");
  const [shake,setShake]=useState(false);
  const doShake=()=>{setShake(true);setTimeout(()=>setShake(false),500);};
  const tap=k=>{
    if(k==="del"){step===1?setPin(p=>p.slice(0,-1)):setConf(p=>p.slice(0,-1));setErr("");return;}
    const cur=step===1?pin:conf;
    if(cur.length>=4)return;
    const nx=cur+k;
    if(step===1){
      setPin(nx);
      if(nx.length===4){
        if(mode==="verify"){if(nx===storedPin)onSuccess();else{setErr("Incorrect PIN");doShake();setPin("");}}
        else setStep(2);
      }
    } else {
      setConf(nx);
      if(nx.length===4){
        if(nx===pin)onSuccess(pin);
        else{setErr("PINs do not match");doShake();setPin("");setConf("");setStep(1);}
      }
    }
  };
  const cur=step===1?pin:conf;
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,"+C.primary+",#1e40af)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:22}}>
      <div style={{marginBottom:26,textAlign:"center"}}>
        <div style={{width:66,height:66,borderRadius:18,background:"rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 10px",border:"2px solid rgba(255,255,255,0.25)"}}>💰</div>
        <div style={{color:"#fff",fontSize:20,fontWeight:800}}>Vasool Book</div>
        <div style={{color:"rgba(255,255,255,0.7)",fontSize:12,marginTop:4}}>
          {mode==="verify"?"Enter your PIN":step===1?"Create a PIN":"Confirm your PIN"}
        </div>
      </div>
      <div style={{display:"flex",gap:14,marginBottom:24,transform:shake?"translateX(8px)":"none",transition:"transform .1s"}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:16,height:16,borderRadius:"50%",background:cur.length>i?"#fff":"rgba(255,255,255,0.25)",border:"2px solid rgba(255,255,255,0.5)",transition:"background .2s"}}/>
        ))}
      </div>
      {err&&<div style={{color:"#fca5a5",fontSize:13,marginBottom:12,fontWeight:600}}>{err}</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,width:240}}>
        {["1","2","3","4","5","6","7","8","9","","0","del"].map(k=>{
          if(!k)return <div key="empty"/>;
          return <button key={k} onClick={()=>tap(k)} style={{height:54,borderRadius:14,border:"1.5px solid rgba(255,255,255,0.25)",background:k==="del"?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.15)",color:"#fff",fontSize:k==="del"?18:20,fontWeight:700,cursor:"pointer"}}>{k==="del"?"⌫":k}</button>;
        })}
      </div>
    </div>
  );
}

// ── SecurityScreen ─────────────────────────────────────────────────────────────
function SecurityScreen({ storedPin, onPinSet, onPinRemove, onClose }) {
  const [mode,setMode]=useState("menu");
  if(mode==="set"||mode==="change") return <PinScreen mode="set" storedPin={storedPin} onSuccess={onPinSet}/>;
  return (
    <div style={{minHeight:"100vh",background:C.bg,maxWidth:430,margin:"0 auto"}}>
      <div style={{background:"linear-gradient(135deg,#1a3a6b,#2563eb)",padding:"14px"}}>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.18)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",fontSize:13,cursor:"pointer",borderRadius:9,padding:"5px 12px",marginBottom:10,fontWeight:700}}>Back</button>
        <div style={{fontSize:18,fontWeight:800,color:"#fff"}}>🔐 Security</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.7)",marginTop:2}}>PIN lock settings</div>
      </div>
      <div style={{padding:"16px"}}>
        <div style={{background:C.card,borderRadius:15,border:"1px solid "+C.border,overflow:"hidden"}}>
          {storedPin?(
            <>
              <div style={{padding:"14px",borderBottom:"1px solid "+C.border,display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:40,height:40,borderRadius:11,background:"#f0fdf4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🔐</div>
                <div><div style={{fontSize:14,fontWeight:700,color:C.text}}>PIN Active</div><div style={{fontSize:11,color:C.success}}>Your app is protected</div></div>
              </div>
              <div onClick={()=>setMode("change")} style={{padding:"14px",borderBottom:"1px solid "+C.border,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:40,height:40,borderRadius:11,background:"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>✏️</div>
                <div><div style={{fontSize:14,fontWeight:700,color:C.text}}>Change PIN</div><div style={{fontSize:11,color:C.muted}}>Set a new PIN</div></div>
              </div>
              <div onClick={onPinRemove} style={{padding:"14px",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:40,height:40,borderRadius:11,background:"#fff0f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🔓</div>
                <div><div style={{fontSize:14,fontWeight:700,color:C.danger}}>Remove PIN</div><div style={{fontSize:11,color:C.muted}}>Disable lock</div></div>
              </div>
            </>
          ):(
            <div onClick={()=>setMode("set")} style={{padding:"14px",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:40,height:40,borderRadius:11,background:"#f0fdf4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🔐</div>
              <div><div style={{fontSize:14,fontWeight:700,color:C.text}}>Set PIN</div><div style={{fontSize:11,color:C.muted}}>Protect your data</div></div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Report row components (top-level to prevent keyboard dismiss on re-render) ──
function IRow({k,label,tamil,optional,r,set,saveAttempted}) {
  const MANDATORY=["finCash","cashOut","ctBank","dfBank","nlAmt","wkColl"];
  const isM=MANDATORY.includes(k);
  const isEmpty=saveAttempted&&isM&&(r[k]===null||r[k]===undefined||r[k]==='');
  return (
    <div style={{display:"flex",alignItems:"center",padding:"13px 13px",borderBottom:"1px solid #e2e8f0",background:isEmpty?"#fff5f5":"#fff"}}>
      <div style={{flex:1,marginRight:10}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          {isM&&(
            <div style={{position:"relative",flexShrink:0}}>
              <div style={{width:20,height:16,borderRadius:3,background:isEmpty?"#dc2626":"#2563eb",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{width:14,height:10,border:"1.5px solid rgba(255,255,255,0.9)",borderRadius:2,background:"transparent",position:"relative"}}>
                  <div style={{position:"absolute",top:0,left:0,right:0,height:"50%",borderBottom:"1.5px solid rgba(255,255,255,0.9)"}}/>
                </div>
              </div>
              <div style={{position:"absolute",top:-4,right:-4,width:8,height:8,borderRadius:"50%",background:isEmpty?"#fbbf24":"#22c55e",border:"1.5px solid #fff"}}/>
            </div>
          )}
          {optional&&(
            <div style={{width:20,height:16,borderRadius:3,background:"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <div style={{width:14,height:10,border:"1.5px solid #94a3b8",borderRadius:2,position:"relative"}}>
                <div style={{position:"absolute",top:0,left:0,right:0,height:"50%",borderBottom:"1.5px solid #94a3b8"}}/>
              </div>
            </div>
          )}
          <span style={{fontSize:14,fontWeight:700,color:isEmpty?"#dc2626":"#0f172a",fontFamily:"Georgia,serif",letterSpacing:0.1}}>{label}</span>
        </div>
        {tamil&&<div style={{fontSize:11,color:isEmpty?"#dc2626":"#64748b",marginTop:3,marginLeft:27}}>{tamil}</div>}
        {isEmpty&&<div style={{fontSize:11,fontWeight:700,color:"#dc2626",marginTop:3,marginLeft:27}}>Enter {label}</div>}
      </div>
      <input
        type="number"
        inputMode="decimal"
        value={r[k]===null||r[k]===undefined?"":r[k]}
        onChange={e=>{const v=e.target.value;set(k,v===""?null:parseFloat(v)||0);}}
        placeholder="0.00"
        style={{width:120,border:"2px solid "+(isEmpty?"#dc2626":isM?"#3b82f6":"#e2e8f0"),borderRadius:10,padding:"9px 11px",fontSize:15,textAlign:"right",outline:"none",fontWeight:800,background:isEmpty?"#fff0f0":isM?"#eff6ff":"#f8fafc",color:"#0f172a",fontFamily:"Georgia,serif"}}
      />
    </div>
  );
}

function RRow({label,val,tamil,color,bg,bold,size}) {
  return (
    <div style={{display:"flex",alignItems:"center",padding:"11px 13px",borderBottom:"1px solid #e2e8f0",background:bg||"#f8fafc"}}>
      <div style={{flex:1,marginRight:10}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:20,height:16,borderRadius:3,background:"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:0.6}}>
            <span style={{fontSize:8,fontWeight:900,color:"#64748b"}}>A</span>
          </div>
          <span style={{fontSize:13,fontWeight:bold?800:600,color:color||"#64748b",fontFamily:"Georgia,serif",fontStyle:"italic"}}>{label}</span>
          <span style={{fontSize:9,background:"#dbeafe",borderRadius:4,padding:"1px 6px",color:"#1d4ed8",fontWeight:700,fontStyle:"normal"}}>AUTO</span>
        </div>

// ── Share Utilities ────────────────────────────────────────────────────────────
function shareText(text, title) {
  if (navigator.share) {
    navigator.share({ title: title || "Vasool Book", text }).catch(()=>{});
  } else {
    navigator.clipboard && navigator.clipboard.writeText(text).then(()=>alert("Copied to clipboard!")).catch(()=>alert(text));
  }
}

async function shareAsImage(elementId, filename) {
  const el = document.getElementById(elementId);
  if (!el) { alert("Nothing to share"); return; }
  try {
    const { default: html2canvas } = await import("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.esm.min.js");
    const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: "#fff" });
    const dataUrl = canvas.toDataURL("image/png");
    const link = document.createElement("a");
    link.download = (filename || "report") + ".png";
    link.href = dataUrl;
    link.click();
    // Also try share API
    canvas.toBlob(blob => {
      if (blob && navigator.share && navigator.canShare && navigator.canShare({ files: [new File([blob], (filename||"report")+".png", { type: "image/png" })] })) {
        navigator.share({ files: [new File([blob], (filename||"report")+".png", { type: "image/png" })], title: filename || "Report" }).catch(()=>{});
      }
    }, "image/png");
  } catch(e) {
    alert("Image export not available. Use screenshot instead.");
  }
}

function buildReportText(r) {
  if (!r) return "";
  const c = calcR(r);
  const line = (n, l, v) => n + ". " + l.padEnd(30," ") + fmtN(v);
  return [
    "═══════════════════════════════",
    "  VASOOL BOOK — Collection Report",
    "  Area: " + r.area,
    "  Date: " + fmtDate(r.date),
    "═══════════════════════════════",
    "",
    "── Cash Details ────────────────",
    line(4,  "Finance Cash",         r.finCash||0),
    line(5,  "Cash Out",             r.cashOut||0),
    line(6,  "Cash Credit/Debit",    c.cashCD),
    line(7,  "Credit to Bank",       r.ctBank||0),
    line(8,  "Debited from Bank",    r.dfBank||0),
    line(9,  "Bank Credit/Debit",    c.bankCD),
    line(10, "Cash on Hand",         c.cashHand),
    "",
    "── Expenses ────────────────────",
    line(11, "Food Expense",         r.food||0),
    line(12, "Fuel",                 r.fuel||0),
    line(13, "Other",                r.other||0),
    line(14, "Total Expenses",       c.totExp),
    "",
    "── New Loans ───────────────────",
    line(15, "Loan Amount",          r.nlAmt||0),
    line(17, "Weekly Loan Amount",   c.wkLoan),
    line(18, "Commission (5%)",      c.comm),
    line(21, "Total Loan Amount",    c.totLoan),
    "",
    "── Collections ─────────────────",
    line(27, "Weekly Collection",    r.wkColl||0),
    line(28, "Interest Collection",  r.intColl||0),
    line(30, "Total Collection",     c.totColl),
    line(32, "Result B",             c.collRes),
    "",
    "── Final Result ────────────────",
    "  Result A (Row 26):   " + fmtN(c.resultA),
    "  Result B (Row 32):   " + fmtN(c.collRes),
    "  DIFFERENCE (A-B):    " + (c.amtDiff>=0?"+":"") + fmtN(c.amtDiff),
    "  STATUS:              " + (c.amtDiff>=0?"SURPLUS ✅":"DEFICIT ❌"),
    "═══════════════════════════════",
  ].join("\n");
}

function buildSummaryText(reports, period, area) {
  if (!reports || reports.length === 0) return "No reports available";
  const T = reports.reduce((acc, r) => {
    const c = calcR(r);
    return {
      coll:   acc.coll   + c.collRes,
      loan:   acc.loan   + c.totLoan,
      cash:   acc.cash   + c.cashHand,
      exp:    acc.exp    + c.totExp,
      diff:   acc.diff   + c.amtDiff,
      wkColl: acc.wkColl + (r.wkColl||0),
    };
  }, {coll:0,loan:0,cash:0,exp:0,diff:0,wkColl:0});
  return [
    "═══════════════════════════════",
    "  VASOOL BOOK — Summary Report",
    "  Period: " + period,
    "  Area:   " + area,
    "  Reports: " + reports.length,
    "═══════════════════════════════",
    "",
    "  Total Collection:   " + fmtN(T.coll),
    "  Weekly Collection:  " + fmtN(T.wkColl),
    "  Total Loan Amount:  " + fmtN(T.loan),
    "  Cash Balance:       " + (T.cash>=0?"+":"") + fmtN(T.cash),
    "  Total Expenses:     " + fmtN(T.exp),
    "",
    "  NET RESULT (A-B):   " + (T.diff>=0?"+":"") + fmtN(T.diff),
    "  STATUS:             " + (T.diff>=0?"SURPLUS ✅":"DEFICIT ❌"),
    "═══════════════════════════════",
  ].join("\n");
}

function buildCashBookText(week, calc) {
  if (!week) return "";
  const c = calc(week);
  return [
    "═══════════════════════════════",
    "  VASOOL BOOK — Cash Book",
    "  Week: " + week.label,
    "  From: " + fmtDate(week.startDate),
    "  Status: " + (week.closed ? "CLOSED" : "OPEN"),
    "═══════════════════════════════",
    "",
    "── Opening Balance ─────────────",
    "  Cash:  " + fmtN(week.openingCash||0),
    "  Bank:  " + fmtN(week.openingBank||0),
    "",
    "── Credits (வரவு) ──────────────",
    ...(week.entries||[]).filter(e=>e.sign==="+").map(e=>"  +" + fmtN(e.amount||0).padStart(12," ") + "  " + (e.desc||"")),
    "  Total Credits:  +" + fmtN(c.totCredits),
    "",
    "── Debits / Expenses (செலவு) ───",
    ...(week.entries||[]).filter(e=>e.sign==="-").map(e=>"  -" + fmtN(e.amount||0).padStart(12," ") + "  " + (e.desc||"")),
    "  Total Expenses: -" + fmtN(c.totDebits),
    "",
    "── Tally ───────────────────────",
    "  Cash Balance:  " + (c.calcCash>=0?"+":"") + fmtN(c.calcCash),
    "  Bank Balance:  " + (c.calcBank>=0?"+":"") + fmtN(c.calcBank),
    "  NET BALANCE:   " + (c.balance>=0?"+":"") + fmtN(c.balance),
    "═══════════════════════════════",
  ].join("\n");
}

          <span style={{fontSize:13,fontWeight:800,color:"#fff",fontFamily:"Georgia,serif"}}>33. Final Result — மாற்ற தொகை (A - B)</span>
        </div>
        <div style={{background:c.amtDiff>=0?"#f0fdf4":"#fff5f5",padding:"14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:13,color:C.muted,fontFamily:"Georgia,serif"}}>Result A (Row 26)</span>
            <span style={{fontSize:15,fontWeight:800,color:C.accent,fontFamily:"Georgia,serif"}}>{fmtN(c.resultA)}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontSize:13,color:C.muted,fontFamily:"Georgia,serif"}}>Result B (Row 32)</span>
            <span style={{fontSize:15,fontWeight:800,color:C.success,fontFamily:"Georgia,serif"}}>{fmtN(c.collRes)}</span>
          </div>
          <div style={{height:1,background:C.border,marginBottom:12}}/>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:38,fontWeight:900,color:c.amtDiff>=0?C.success:C.danger,fontFamily:"Georgia,serif"}}>{c.amtDiff>=0?"+":""}{fmtN(c.amtDiff)}</div>
            <div style={{marginTop:8,display:"inline-block",background:c.amtDiff>=0?C.success:C.danger,color:"#fff",fontSize:14,fontWeight:800,borderRadius:20,padding:"5px 20px",fontFamily:"Georgia,serif"}}>
              {c.amtDiff>=0?"SURPLUS":"DEFICIT"}
            </div>
            <div style={{fontSize:12,color:C.muted,marginTop:10,fontFamily:"Georgia,serif"}}>{c.amtDiff>=0?"வசூல் அதிகம் (Collection Surplus)":"வசூல் குறைவு (Collection Deficit)"}</div>
          </div>
        </div>
      </div>


    </div>
  );
}


// ── BarChart ───────────────────────────────────────────────────────────────────
function BarChart({ data, keys, colors, labels, title, height }) {
  const H = height || 140;
  const maxV = Math.max(...data.map(d => Math.max(...keys.map(k => Math.abs(d[k] || 0)))), 1);
  const bar = v => Math.max(4, Math.round((Math.abs(v) / maxV) * (H - 30)));
  return (
    <div style={{background:"#ffffff",borderRadius:14,padding:"14px 12px",border:"1px solid #e2e8f0",marginBottom:10}}>
      <div style={{fontSize:13,fontWeight:800,color:"#1a3a6b",marginBottom:8,fontFamily:"Georgia,serif"}}>{title}</div>
      <div style={{display:"flex",gap:10,marginBottom:10,flexWrap:"wrap"}}>
        {keys.map((k,i)=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:10,height:10,borderRadius:2,background:colors[i]}}/>
            <span style={{fontSize:10,color:"#64748b",fontWeight:600}}>{labels[i]}</span>
          </div>
        ))}
      </div>
      <div style={{overflowX:"auto"}}>
        <div style={{display:"flex",gap:6,alignItems:"flex-end",minWidth:Math.max(data.length*60,280),height:H,padding:"0 4px"}}>
          {data.map((d,i)=>(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:50}}>
              <div style={{display:"flex",gap:3,alignItems:"flex-end",height:H-26}}>
                {keys.map((k,ki)=>(
                  <div key={k} style={{width:14,background:colors[ki],borderRadius:"3px 3px 0 0",height:bar(d[k]||0),opacity:0.88,transition:"height .3s"}} title={labels[ki]+": "+fmtN(d[k]||0)}/>
                ))}
              </div>
              <div style={{fontSize:8,color:"#64748b",fontWeight:600,textAlign:"center",lineHeight:1.2,maxWidth:50,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── SummaryScreen ──────────────────────────────────────────────────────────────
function SummaryScreen({ reports, areas, onClose, inline }) {
  const [period, setPeriod] = useState("month");
  const [dfrom,  setDfrom]  = useState("");
  const [dto,    setDto]    = useState("");
  const [showCal,setShowCal]= useState(null);
  const [areaTab,setAreaTab]= useState("all");

  const today = getTodayISO();
  const todayD = new Date(today);

  const inPeriod = r => {
    const rd = new Date(r.date);
    if (period==="week")    { const ws=new Date(todayD); ws.setDate(todayD.getDate()-todayD.getDay()); return rd>=ws&&rd<=todayD; }
    if (period==="month")   return r.date.slice(0,7)===today.slice(0,7);
    if (period==="quarter") { const qm=Math.floor(todayD.getMonth()/3)*3; const qs=new Date(todayD.getFullYear(),qm,1); return rd>=qs&&rd<=todayD; }
    if (period==="year")    return r.date.slice(0,4)===today.slice(0,4);
    if (period==="custom")  { const f=dfrom?new Date(dfrom):new Date("2000-01-01"); const t=dto?new Date(dto):new Date("2099-12-31"); return rd>=f&&rd<=t; }
    return true;
  };

  const filtered = reports.filter(r => (areaTab==="all" || r.area===areaTab) && inPeriod(r));

  const sumAll = recs => recs.reduce((a, r) => {
    const c = calcR(r);
    return {
      coll:    a.coll    + c.collRes,
      loan:    a.loan    + c.totLoan,
      cash:    a.cash    + c.cashHand,
      exp:     a.exp     + c.totExp,
      diff:    a.diff    + c.amtDiff,
      surplus: a.surplus + c.surplus,
      deficit: a.deficit + c.deficit,
      wkColl:  a.wkColl  + (r.wkColl||0),
      intColl: a.intColl + (r.intColl||0),
      nlAmt:   a.nlAmt   + (r.nlAmt||0),
      comm:    a.comm    + c.commInc,
      wkLoan:  a.wkLoan  + c.wkLoan,
      totExp:  a.totExp  + c.totExp,
    };
  }, {coll:0,loan:0,cash:0,exp:0,diff:0,surplus:0,deficit:0,wkColl:0,intColl:0,nlAmt:0,comm:0,wkLoan:0,totExp:0});

  const T = sumAll(filtered);

  const PERIODS = [
    {k:"week",l:"Week"},{k:"month",l:"Month"},{k:"quarter",l:"Quarter"},
    {k:"year",l:"Year"},{k:"all",l:"All Time"},{k:"custom",l:"Custom"},
  ];

  const SCard = ({icon,label,val,col,sub}) => (
    <div style={{background:"#fff",borderRadius:14,padding:"13px 12px",border:"1px solid #e2e8f0",boxShadow:"0 2px 6px rgba(0,0,0,0.04)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <span style={{fontSize:20}}>{icon}</span>
        <span style={{fontSize:10,fontWeight:800,color:"#64748b",textTransform:"uppercase",letterSpacing:0.4}}>{label}</span>
      </div>
      <div style={{fontSize:16,fontWeight:900,color:col,fontFamily:"Georgia,serif"}}>{val<0?"-":""}{fmtN(Math.abs(val))}</div>
      {sub&&<div style={{fontSize:10,color:"#94a3b8",marginTop:3}}>{sub}</div>}
    </div>
  );

  return (
    <div id="summary-screen-body" style={{background:"#f0f4ff",minHeight:"100vh",maxWidth:430,margin:"0 auto",paddingBottom:inline?80:30}}>
      {showCal&&<CalendarPicker value={showCal==="from"?dfrom:dto} onChange={v=>showCal==="from"?setDfrom(v):setDto(v)} onClose={()=>setShowCal(null)}/>}

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1a3a6b,#2563eb)",padding:"14px 14px 0",boxShadow:"0 4px 20px rgba(26,58,107,0.3)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
          {!inline&&<button onClick={onClose} style={{background:"rgba(255,255,255,0.18)",border:"1.5px solid rgba(255,255,255,0.3)",color:"#fff",fontSize:20,cursor:"pointer",borderRadius:10,padding:"5px 13px",lineHeight:1}}>&#8592;</button>}
          <div style={{flex:1}}>
            <div style={{fontSize:17,fontWeight:900,color:"#fff",fontFamily:"Georgia,serif"}}>Summary Report</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.65)"}}>சுருக்க அறிக்கை — {filtered.length} reports</div>
          </div>
          <button onClick={()=>{
            const txt = buildSummaryText(filtered, period, areaTab);

            menu.innerHTML = `<div style="background:#fff;border-radius:22px 22px 0 0;padding:22px 18px 34px;width:100%;max-width:430px"><div style="width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 16px"></div><div style="font-size:15px;font-weight:900;color:#1a3a6b;font-family:Georgia,serif;margin-bottom:16px">📤 Share Summary</div><div style="display:flex;flex-direction:column;gap:10px"><button id="ss-text" style="padding:13px;border-radius:12px;background:#f0fdf4;border:1.5px solid #22c55e;color:#15803d;font-size:14px;font-weight:800;cursor:pointer;text-align:left">📝 Share as Text</button><button id="ss-png" style="padding:13px;border-radius:12px;background:#eff6ff;border:1.5px solid #3b82f6;color:#1d4ed8;font-size:14px;font-weight:800;cursor:pointer;text-align:left">🖼️ Save as PNG Image</button><button id="ss-cancel" style="padding:13px;border-radius:12px;background:#f8fafc;border:1.5px solid #e2e8f0;color:#64748b;font-size:14px;cursor:pointer">Cancel</button></div></div>`;
            document.body.appendChild(menu);
            document.getElementById("ss-text").onclick = () => { shareText(txt,"Summary Report"); menu.remove(); };
            document.getElementById("ss-png").onclick  = () => { menu.remove(); setTimeout(()=>shareAsImage("summary-screen-body","summary-"+period),100); };

        <div style={{display:"flex",gap:3,overflowX:"auto",paddingBottom:0}}>

              {l}

          ))}
        </div>
      </div>

      {/* Custom date picker */}

      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",overflowX:"auto",display:"flex",gap:0}}>

          <div style={{fontSize:11,fontWeight:800,color:"rgba(255,255,255,0.75)",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Net Result (A - B)</div>

                    {[
                      {l:"Collection",v:AT.coll,  col:"#16a34a"},
                      {l:"Loan Amt",  v:AT.loan,  col:"#dc2626"},
                      {l:"Cash Bal",  v:AT.cash,  col:AT.cash>=0?"#16a34a":"#dc2626"},
                    ].map(({l,v,col})=>(
                      <div key={l}>
                        <div style={{fontSize:8,fontWeight:700,color:"#64748b",textTransform:"uppercase",marginBottom:2}}>{l}</div>
                        <div style={{fontSize:11,fontWeight:800,color:col,fontFamily:"Georgia,serif"}}>{v<0?"-":""}{fmtN(Math.abs(v))}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{height:6,background:"#e2e8f0",borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",width:pct+"%",background:AT.diff>=0?"#22c55e":"#dc2626",borderRadius:3,transition:"width .5s"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
                    <span style={{fontSize:9,color:"#94a3b8"}}>Share of total collection</span>
                    <span style={{fontSize:9,fontWeight:700,color:"#64748b"}}>{pct}%</span>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Report count info */}
        <div style={{background:"#fff",borderRadius:14,border:"1px solid #e2e8f0",padding:"14px",textAlign:"center"}}>
          <div style={{fontSize:28,marginBottom:6}}>📋</div>
          <div style={{fontSize:14,fontWeight:800,color:"#1a3a6b",fontFamily:"Georgia,serif"}}>{filtered.length} Reports</div>
          <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{areaTab==="all"?"All Areas":areaTab} · {period==="all"?"All Time":period==="custom"?(dfrom?fmtDate(dfrom):"?")+" to "+(dto?fmtDate(dto):"?"):period.charAt(0).toUpperCase()+period.slice(1)}</div>
        </div>
      </div>
    </div>
  );
}

// ── CashBook ──────────────────────────────────────────────────────────────────
const WEEK_DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// Generate week-range label options: for each of 7 possible start days,
// show "Mon 03 Mar - Sun 09 Mar 2026" style label
const genWeekLabels = (startDate) => {
  return Array.from({length:7}, (_,i) => {
    const s = new Date(startDate);
    s.setDate(s.getDate() + i);
    const e = new Date(s);
    e.setDate(s.getDate() + 6);
    const pad = d => String(d.getDate()).padStart(2,"0");
    const sDow = WEEK_DAYS[s.getDay()].slice(0,3);
    const eDow = WEEK_DAYS[e.getDay()].slice(0,3);
    const sMo  = MONTHS_SHORT[s.getMonth()];
    const eMo  = MONTHS_SHORT[e.getMonth()];
    const sameMonthYear = s.getMonth()===e.getMonth() && s.getFullYear()===e.getFullYear();
    const left  = sDow+" "+pad(s)+(sameMonthYear?"":" "+sMo+(s.getFullYear()!==e.getFullYear()?" "+s.getFullYear():""));
    const right = eDow+" "+pad(e)+" "+eMo+" "+e.getFullYear();
    return left + " → " + right;
  });
};
